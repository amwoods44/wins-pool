<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wins Pool 2026 — ESPN-Style Dashboard</title>
<meta name="description" content="Live MLB wins pool dashboard tracking 8 players, 24 teams across 162 games. Real-time standings, projections, and race charts.">

<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<style>

@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700;800&display=swap');

/* ═══ LOADING SCREEN ═══ */
.loading-screen{position:fixed;inset:0;z-index:9999;background:var(--g1);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease,visibility .6s ease}
.loading-screen.fade-out{opacity:0;visibility:hidden;pointer-events:none}
.loading-logo{width:120px;height:auto;margin-bottom:24px;animation:loadPulse 1.8s ease-in-out infinite}
.loading-title{font-family:'Oswald',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:-1px;line-height:1}
.loading-title .ld-acc{color:#ffcc00}
.loading-sub{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#666;margin-top:12px}
.loading-spinner{width:36px;height:36px;border:3px solid #262626;border-top-color:#cc0000;border-radius:50%;animation:spin .8s linear infinite;margin-top:28px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes loadPulse{0%,100%{opacity:.6;transform:scale(.97)}50%{opacity:1;transform:scale(1)}}

/* ═══ DATA STATUS INDICATOR ═══ */
.data-status{position:fixed;top:60px;right:16px;z-index:950;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:opacity .3s;opacity:.7}
.data-status:hover{opacity:1}
.data-status.ok{color:var(--grn);background:var(--grn-bg)}
.data-status.stale{color:var(--y);background:rgba(255,204,0,.1)}
.data-status.err{color:var(--red-t);background:var(--red-bg)}

:root{
  --r:#cc0000;--rd:#990000;--rb:#e60000;--y:#ffcc00;
  --g1:#0c0c0c;--g2:#141414;--g3:#1c1c1c;--g4:#262626;--g5:#333;--g6:#444;
  --t1:#fff;--t2:#d4d4d4;--t3:#999;--t4:#666;
  --grn:#17b169;--grn-bg:rgba(23,177,105,.12);--red-t:#ff4444;--red-bg:rgba(255,68,68,.12);
  --fd:'Oswald',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--fb);background:var(--g1);color:var(--t1);min-height:100vh;overflow-x:hidden;padding-bottom:100px}

/* ═══ HEADER ═══ */
.hdr{background:linear-gradient(180deg,#1a1a1a,#111);border-bottom:3px solid var(--r);position:sticky;top:0;z-index:1000;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.hdr-in{max-width:1440px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px}
.hdr-espn-logo{height:28px;width:auto;flex-shrink:0}
.hdr-div{width:2px;height:32px;background:var(--g5);margin:0 14px;transform:skewX(-12deg);display:inline-block;vertical-align:middle}
.hdr-sub{font-family:var(--fd);font-weight:600;font-size:16px;letter-spacing:4px;text-transform:uppercase;color:var(--t3);vertical-align:middle}
.hdr-right{display:flex;align-items:center;gap:20px}
.live-badge{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:4px;background:rgba(204,0,0,.12);border:1px solid rgba(204,0,0,.3)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--r);box-shadow:0 0 10px rgba(204,0,0,.6);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-txt{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--r)}
.nfl-cd{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:6px;background:rgba(0,53,148,.1);border:1px solid rgba(0,53,148,.25);white-space:nowrap}
.nfl-cd-units{display:flex;gap:6px;align-items:center}
.nfl-cd-box{text-align:center}
.nfl-cd-num{font-family:var(--fd);font-size:18px;font-weight:800;color:#6ba3e8;line-height:1;background:rgba(0,53,148,.2);border:1px solid rgba(0,53,148,.35);border-radius:4px;padding:4px 7px;min-width:30px;display:inline-block}
.nfl-cd-lbl{font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(107,163,232,.7);margin-top:2px}
.nfl-cd-sep{font-family:var(--fd);font-size:14px;font-weight:700;color:rgba(107,163,232,.3);margin:0 -2px;align-self:flex-start;padding-top:4px}
.nfl-cd-tag{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-left:2px;line-height:1.2;text-align:center}
.nfl-cd-tag span{display:block;color:#6ba3e8;font-size:12px;letter-spacing:1px}
.nfl-cd-text{font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:2px;color:#6ba3e8}

/* ═══ HERO ═══ */
.hero{position:relative;overflow:hidden;background:linear-gradient(180deg,#1a0a0a,#0f0f0f 40%,var(--g1));padding:40px 28px 36px;text-align:center}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 250px at 50% 20%,rgba(204,0,0,.06),transparent);pointer-events:none}
.hero::after{content:'';position:absolute;top:-50%;left:-10%;width:120%;height:200%;background:repeating-linear-gradient(-45deg,transparent,transparent 80px,rgba(204,0,0,.015) 80px,rgba(204,0,0,.015) 81px);pointer-events:none}
.hero-c{position:relative;z-index:1}
.hero-ey{font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:var(--r);margin-bottom:8px}
.hero-h{font-family:var(--fd);font-size:clamp(52px,8vw,88px);font-weight:800;letter-spacing:-1px;line-height:.9;color:white;text-transform:uppercase}
.hero-h .acc{color:var(--y)}
.hero-tag{font-family:var(--fd);font-size:19px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:var(--t3);margin-top:14px}
.hero-tag b{color:var(--t2);font-weight:600}
.hero-bar{height:4px;background:linear-gradient(90deg,transparent 5%,var(--r) 20%,var(--r) 80%,transparent 95%);margin-top:28px}

/* ═══ CAST STRIP — character lineup ═══ */
.cast{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--g1),rgba(12,12,12,.95));padding:12px 0;max-width:1440px;margin:0 auto}
/* Edge fade vignette */
.cast::before,.cast::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2;pointer-events:none}
.cast::before{left:0;background:linear-gradient(90deg,var(--g1),transparent)}
.cast::after{right:0;background:linear-gradient(270deg,var(--g1),transparent)}
.cast-in{display:flex;align-items:center;justify-content:center;gap:0;padding:0 40px;position:relative}
.cast-fig{flex-shrink:0;position:relative;width:80px;height:80px;border-radius:50%;overflow:hidden;border:2px solid var(--g5);background:var(--g3);transition:all .3s;cursor:default;margin:0 -6px}
.cast-fig:hover{transform:scale(1.15);z-index:3;border-color:var(--r);box-shadow:0 0 20px rgba(204,0,0,.3)}
.cast-fig img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:saturate(.9)}
.cast-fig:hover img{filter:saturate(1.1)}
/* Tooltip on hover */
.cast-fig::after{content:attr(data-label);position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.cast-fig:hover::after{opacity:1}
/* Bottom accent line */
.cast-line{height:1px;background:linear-gradient(90deg,transparent 10%,var(--g5) 30%,var(--g5) 70%,transparent 90%);margin-top:8px}

/* Countdown */
.countdown{display:flex;justify-content:center;gap:12px;margin-top:22px}
.cd-unit{text-align:center}
.cd-num{font-family:var(--fd);font-size:40px;font-weight:800;color:var(--y);line-height:1;background:var(--g3);border:1px solid var(--g5);border-radius:6px;padding:8px 14px;min-width:56px;display:inline-block;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.cd-lbl{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-top:6px}
.cd-message{font-family:var(--fd);font-size:16px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-top:16px}

/* Progress bar (season) */
.hp-wrap{max-width:420px;margin:16px auto 0;display:flex;align-items:center;gap:12px}
.hp-lbl{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);white-space:nowrap}
.hp-bar{flex:1;height:3px;background:var(--g4);border-radius:2px;overflow:hidden}
.hp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--r),var(--y));transition:width 2s cubic-bezier(.22,1,.36,1)}
.hp-pct{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--y);min-width:40px;text-align:right}
.hp-games{font-family:var(--fd);font-size:12px;font-weight:500;color:var(--t3);letter-spacing:1px;white-space:nowrap}

/* ═══ LIVE SCOREBOARD TICKER ═══ */
.sb-wrap{position:fixed;bottom:36px;left:0;right:0;z-index:1999;height:38px;background:linear-gradient(180deg,#234d35,#1a3928);border-top:1px solid rgba(80,160,100,.25);box-shadow:0 -2px 12px rgba(0,0,0,.4);overflow:hidden;display:none}
.sb-wrap.has-games{display:flex;align-items:center}
/* Foul pole accent — left edge */
.sb-wrap::before{content:'';position:absolute;top:0;bottom:0;left:0;width:4px;background:linear-gradient(180deg,#f5d442,#d4a017);z-index:10;box-shadow:1px 0 6px rgba(244,208,63,.2)}
/* Label tag */
.sb-tag{flex-shrink:0;height:100%;display:flex;align-items:center;padding:0 14px 0 12px;background:linear-gradient(180deg,rgba(0,0,0,.3),rgba(0,0,0,.15));border-right:1px solid rgba(60,130,80,.2);font-family:var(--fd);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(200,230,200,.6);gap:6px;position:relative;z-index:2}
.sb-tag-live{color:#ff5555}
.sb-tag-dot{width:7px;height:7px;border-radius:50%;background:#ff3333;animation:sbPulse 1.5s ease-in-out infinite}
@keyframes sbPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,51,51,.7)}50%{box-shadow:0 0 0 5px rgba(255,51,51,0)}}
/* Scrolling track */
.sb-sw{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;mask-image:linear-gradient(90deg,transparent,#000 30px,#000 calc(100% - 30px),transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 30px,#000 calc(100% - 30px),transparent)}
.sb-s{display:flex;align-items:center;white-space:nowrap;animation:sbScroll var(--sb-dur,120s) linear infinite}
.sb-s:hover{animation-play-state:paused}
@keyframes sbScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* Individual game entry — chalk-bordered card inline */
.sb-g{display:inline-flex;align-items:center;gap:0;padding:3px 12px;flex-shrink:0;height:30px;border:1px solid rgba(200,230,200,.28);border-radius:4px;background:rgba(0,0,0,.12);margin:0 5px;position:relative}
.sb-g-live{border-color:rgba(255,80,80,.3);background:rgba(255,51,51,.05)}
.sb-g-final{opacity:.6}.sb-g-final:hover{opacity:.85}
/* Team line: logo + abbr + score */
.sb-tm{display:inline-flex;align-items:center;gap:4px}
.sb-tm .lbox{width:20px;height:20px;border-radius:3px;flex-shrink:0}
.sb-tm .lbox img{width:15px;height:15px}
.sb-abbr{font-family:var(--fd);font-size:12px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.5px}
.sb-sc{font-family:var(--fm);font-size:14px;font-weight:800;color:rgba(255,255,255,.85);margin:0 2px;min-width:14px;text-align:center;font-variant-numeric:tabular-nums}
.sb-sc-live{color:#fff;text-shadow:0 0 6px rgba(255,255,255,.2)}
.sb-win .sb-abbr{color:#fff}.sb-win .sb-sc{color:#fff}
/* "at" divider between teams */
.sb-at{font-family:var(--fd);font-size:9px;font-weight:600;color:rgba(200,230,200,.45);margin:0 5px;letter-spacing:1px;text-transform:uppercase}
/* Status badge */
.sb-st{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-left:6px;padding:1px 6px;border-radius:3px;line-height:15px;display:inline-flex;align-items:center;gap:3px}
.sb-st-live{background:rgba(255,51,51,.15);color:#ff5555;border:1px solid rgba(255,51,51,.25)}
.sb-st-live .sb-pip{width:5px;height:5px;border-radius:50%;background:#ff3333;animation:sbPulse 1.5s ease-in-out infinite}
.sb-st-final{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35)}
.sb-st-pre{background:rgba(200,230,200,.06);color:rgba(200,230,200,.5)}
.sb-st-pre .sb-time{font-family:var(--fm);font-weight:700;font-size:10px;color:rgba(200,230,200,.65)}
/* Pool owner tag */
.sb-pool{font-family:var(--fd);font-size:9px;font-weight:700;color:#f5d442;margin-left:1px}
/* Pitchers for upcoming */
.sb-pit{font-family:var(--fb);font-size:10px;font-weight:500;color:rgba(200,230,200,.35);margin-left:6px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-pit b{font-weight:600;color:rgba(200,230,200,.5)}
/* Spacer between game cards (replaces diamond) */
.sb-sep{width:2px;flex-shrink:0}

/* ═══ BREAKING NEWS — TICKER TAKEOVER ═══ */
.bl-break{position:absolute;inset:0;display:flex;align-items:center;background:linear-gradient(90deg,#1a0a0a,#111 30%);opacity:0;pointer-events:none;transition:opacity .4s ease;z-index:10}
.bl-break.active{opacity:1;pointer-events:auto}
.bl-break-tag{flex-shrink:0;background:var(--r);color:white;padding:0 18px;height:100%;display:flex;align-items:center;font-family:var(--fd);font-size:12px;font-weight:800;letter-spacing:3px;text-transform:uppercase;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 100%,0 100%);padding-right:24px;animation:breakFlash 1.5s infinite}
@keyframes breakFlash{0%,100%{background:var(--r)}50%{background:#ff1a1a}}
.bl-break-text{flex:1;padding:0 20px;font-family:var(--fd);font-size:13px;font-weight:600;color:var(--t2);letter-spacing:.5px;overflow:hidden;white-space:nowrap;mask-image:linear-gradient(90deg,transparent,#000 20px,#000 calc(100% - 20px),transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 20px,#000 calc(100% - 20px),transparent)}
.bl-break-text span{display:inline-block;white-space:nowrap;animation:breakScroll 8s linear infinite}
@keyframes breakScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.bl-break-text b{color:var(--y);margin:0 3px}

/* ═══ NAV ═══ */
.nav-bar{background:var(--g2);border-bottom:1px solid var(--g5);position:sticky;top:59px;z-index:900}
.nav-in{max-width:1440px;margin:0 auto;padding:0 28px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.nav-in::-webkit-scrollbar{display:none}
.nav-btn{font-family:var(--fd);padding:14px 28px;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;position:relative}
.nav-btn:hover{color:var(--t1);background:rgba(255,255,255,.02)}
.nav-btn.active{color:white;border-bottom-color:var(--r)}
.nav-btn:focus-visible{outline:2px solid var(--y);outline-offset:-2px;border-radius:2px}

/* ═══ ACCESSIBILITY ═══ */
.pcard:focus-visible{outline:2px solid var(--y);outline-offset:2px}
.cmp-select:focus-visible{outline:2px solid var(--y);outline-offset:2px}
.rc-leg:focus-visible{outline:2px solid var(--y);outline-offset:2px;border-radius:4px}
.skip-link{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:10000;font-family:var(--fd);font-size:14px;padding:12px 20px;background:var(--r);color:white;text-decoration:none;font-weight:700;letter-spacing:2px}
.skip-link:focus{position:fixed;left:16px;top:16px;width:auto;height:auto;overflow:visible}

/* ═══ COUNT-UP ANIMATION ═══ */
.num-change{animation:numPop .4s cubic-bezier(.22,1,.36,1)}
@keyframes numPop{0%{transform:scale(1.2);color:var(--y)}100%{transform:scale(1)}}

/* ═══ MAIN ═══ */
.main{max-width:1440px;margin:0 auto;padding:0 28px}

/* ═══ BROADCAST HEADERS ═══ */
.bh{display:flex;align-items:stretch;margin:28px 0 18px}
.bh-tag{font-family:var(--fd);background:var(--r);color:white;padding:8px 20px;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,0 100%)}
.bh-acc{width:60px;background:linear-gradient(90deg,var(--rd),var(--g3));clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,0 100%)}
.bh-line{flex:1;display:flex;align-items:center;border-bottom:1px solid var(--g5);margin-left:-1px}
.bh-sub{font-family:var(--fd);font-size:14px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--t4);padding-left:16px}

/* ═══ PANELS ═══ */
.panel{display:none;padding-bottom:32px;position:relative}
.panel.active{display:block}
/* Screen wipe animation */
.panel.wipe-in{animation:wipeIn .4s ease-out}
@keyframes wipeIn{
  from{clip-path:inset(0 100% 0 0);opacity:.8}
  to{clip-path:inset(0 0 0 0);opacity:1}
}

/* ═══ STAT STRIP ═══ */
.sstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--g5);border-radius:8px;overflow:hidden;margin-bottom:28px;box-shadow:0 4px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.03)}
.ss{padding:22px 16px 18px;text-align:center;position:relative;background:var(--g2);overflow:hidden}
/* Subtle diagonal texture per cell */
.ss::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 20px,rgba(255,255,255,.008) 20px,rgba(255,255,255,.008) 21px);pointer-events:none}
/* Featured stat: leader — red glow accent */
.ss.feat{background:linear-gradient(180deg,rgba(204,0,0,.08),var(--g2) 60%)}
.ss.feat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--r),transparent)}
/* Non-featured top accent line */
.ss:not(.feat)::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:var(--g5)}
.ss-l{font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--t4);margin-bottom:10px}
.ss.feat .ss-l{color:var(--r);font-weight:700}
.ss-v{font-family:var(--fd);font-size:36px;font-weight:800;line-height:1;letter-spacing:-1px;text-shadow:0 2px 12px rgba(0,0,0,.3)}
.ss.feat .ss-v{text-shadow:0 0 20px rgba(204,0,0,.3)}
.ss-sub{font-family:var(--fd);font-size:12px;font-weight:400;letter-spacing:1px;color:var(--t4);margin-top:6px}

/* ═══ LOGO CONTAINERS ═══ */
/* WHITE background always. Team color on border only. Every logo readable, guaranteed. */
.lbox{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:6px;background:#f0f0f0;border:2px solid var(--acc,#666)}
.lbox img{object-fit:contain;image-rendering:auto}
.lbox.lg{width:56px;height:56px;padding:4px}.lbox.lg img{width:46px;height:46px}
.lbox.md{width:44px;height:44px;padding:3px}.lbox.md img{width:36px;height:36px}
.lbox.sm{width:36px;height:36px;padding:2px}.lbox.sm img{width:30px;height:30px}
.lbox.xs{width:28px;height:28px;padding:2px}.lbox.xs img{width:22px;height:22px}
.lbox.mini{width:22px;height:22px;padding:1px;border-radius:4px;border-width:1px}.lbox.mini img{width:18px;height:18px}

/* ═══ POWER RANKINGS ═══ */
.plist{display:flex;flex-direction:column;gap:6px}
.pcard{display:grid;grid-template-columns:56px 4px 1fr auto;align-items:center;background:var(--g2);border:1px solid var(--g5);border-radius:6px;overflow:hidden;transition:all .2s;cursor:pointer}
.pcard:hover{border-color:var(--g6);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.pcard.r1{border-color:rgba(204,0,0,.3)}
.pcard.r1 .prk{background:var(--r)}
.prk{background:var(--g4);display:flex;align-items:center;justify-content:center;padding:16px 0;align-self:stretch}
.prk-n{font-family:var(--fd);font-size:34px;font-weight:800;min-width:32px;text-align:center}
.pcbar{width:4px;align-self:stretch}
.pinfo{padding:16px 20px;display:flex;align-items:center;gap:16px;min-width:0}
.plogos{display:flex;gap:12px;flex-shrink:0}
.pname{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-family:var(--fd);font-size:14px;font-weight:400;color:var(--t3);margin-top:2px;letter-spacing:1px}
.pnums{display:flex;align-items:center;gap:24px;padding:16px 24px;flex-shrink:0}
.pnb{text-align:center;min-width:48px}
.pnv{font-family:var(--fd);font-weight:800;line-height:1;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.pnv.w{font-size:38px;min-width:48px;display:inline-block;text-align:center}
.pnv.p{font-size:20px;color:var(--y)}
.pnv.o{font-size:20px;color:var(--t3)}
.pnl{font-family:var(--fd);font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-top:4px}
.parr{padding:0 16px;font-size:12px;color:var(--t4);transition:transform .3s}
.pcard.open .parr{transform:rotate(180deg)}
.pdet{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.22,1,.36,1);grid-column:1/-1}
.pcard.open .pdet{max-height:300px}
.pdet-in{padding:0 20px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-left:56px}
@media(max-width:768px){.pdet-in{grid-template-columns:1fr;margin-left:0;padding:0 10px 14px}}
.ptc{background:var(--g3);border:1px solid var(--g5);border-radius:8px;padding:14px;display:flex;gap:12px;align-items:center;position:relative;overflow:hidden}
.ptc-name{font-family:var(--fd);font-size:18px;font-weight:700;text-transform:uppercase}
.ptc-meta{font-size:13px;color:var(--t4);margin-top:2px}
.ptc-rec{font-family:var(--fd);font-size:22px;font-weight:700}
.ptc-pace{font-size:13px;color:var(--t3);margin-top:2px}
.dbadge{display:inline-block;font-family:var(--fd);font-size:13px;font-weight:700;padding:2px 6px;border-radius:3px}
.dbadge.ov{background:var(--grn-bg);color:var(--grn)}
.dbadge.un{background:var(--red-bg);color:var(--red-t)}
.dbadge.ev{background:rgba(255,255,255,.05);color:var(--t4)}

/* ═══ GAME STATUS BADGES ═══ */
.last-game{display:inline-flex;align-items:center;gap:4px;font-family:var(--fd);font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.5px;vertical-align:middle}
.last-game.gw{background:rgba(0,200,83,.12);color:#4caf50}
.last-game.gl{background:rgba(204,0,0,.12);color:#ef5350}
.last-game.glive{background:rgba(204,0,0,.15);color:#fff;border:1px solid rgba(204,0,0,.4)}
.last-game.gup{background:rgba(255,255,255,.05);color:var(--t3)}
.lg-wl{font-weight:800;font-size:13px}
.lg-score{font-weight:700}
.lg-opp{font-weight:500}
.gw .lg-opp,.gl .lg-opp{color:inherit;opacity:.7}
.lg-inn{font-weight:700;color:var(--y);font-size:11px}
.lg-time{font-weight:700;color:var(--t2)}
.lg-live-dot{width:6px;height:6px;border-radius:50%;background:var(--r);animation:livePulse 1.5s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(204,0,0,.6)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(204,0,0,0)}}

/* ═══ NARRATIVE / HIGHLIGHTS ═══ */
.narrative{background:var(--g2);border:1px solid var(--g5);border-radius:8px;padding:24px;margin-top:20px;position:relative;overflow:hidden}
.narrative::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--r)}
.nar-items{display:flex;flex-direction:column;gap:14px}
.nar-item{display:flex;gap:12px;align-items:flex-start}
.nar-icon{flex-shrink:0;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--g4);border:1px solid var(--g5)}
.nar-text{font-family:var(--fd);font-size:17px;font-weight:500;color:var(--t2);line-height:1.5;letter-spacing:.3px}
.nar-text b{color:var(--y);font-weight:700}
.nar-text .red{color:var(--r);font-weight:700}

/* ═══ RACE CHART ═══ */
.rc-wrap{background:var(--g2);border:1px solid var(--g5);border-radius:8px;overflow:hidden;margin-top:20px}
.rc-hdr{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--g5)}
.rc-title{font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.rc-legend{display:flex;gap:14px;flex-wrap:wrap}
.rc-leg{display:flex;align-items:center;gap:5px;cursor:pointer;opacity:1;transition:opacity .2s}
.rc-leg.dim{opacity:.25}
.rc-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.rc-ln{font-family:var(--fd);font-size:13px;font-weight:600;color:var(--t3)}
.rc-body{padding:20px;position:relative}
.rc-cw{position:relative;width:100%;height:320px}
#raceCanvas{width:100%;height:100%;display:block}
.rc-tt{position:absolute;pointer-events:none;background:var(--g3);border:1px solid var(--g5);border-radius:6px;padding:10px 14px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:10;display:none;max-width:200px}
.rc-tt-w{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:6px}
.rc-tt-r{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.rc-tt-d{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.rc-tt-n{font-family:var(--fd);font-size:12px;font-weight:600;color:var(--t2);flex:1}
.rc-tt-v{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--y)}
.rc-empty{text-align:center;padding:60px 20px;font-family:var(--fd);color:var(--t4);font-size:16px;letter-spacing:2px;text-transform:uppercase}
.rc-empty b{color:var(--t3);display:block;margin-bottom:8px;font-size:22px}

/* ═══ COMPARISON TOOL ═══ */
.compare-wrap{background:var(--g2);border:1px solid var(--g5);border-radius:8px;overflow:hidden;margin-top:20px}
.cmp-hdr{padding:16px 20px;border-bottom:1px solid var(--g5);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.cmp-label{font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}
.cmp-select{font-family:var(--fd);font-size:16px;font-weight:600;background:var(--g4);border:1px solid var(--g5);color:var(--t1);padding:8px 14px;border-radius:6px;cursor:pointer;letter-spacing:.5px}
.cmp-select:focus{outline:none;border-color:var(--r)}
.cmp-vs{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--r);letter-spacing:2px}
.cmp-body{padding:20px}
.cmp-cols{display:grid;grid-template-columns:1fr 60px 1fr;gap:0}
.cmp-col{text-align:center}
.cmp-col-name{font-family:var(--fd);font-size:28px;font-weight:800;text-transform:uppercase;margin-bottom:16px}
.cmp-row{display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;padding:10px 0;border-bottom:1px solid rgba(51,51,51,.3)}
.cmp-row:last-child{border-bottom:none}
.cmp-row-val{font-family:var(--fd);font-size:24px;font-weight:700;letter-spacing:-.5px}
.cmp-row-val.left{text-align:right;padding-right:20px}
.cmp-row-val.right{text-align:left;padding-left:20px}
.cmp-row-val.win{color:var(--y)}
.cmp-row-label{font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);text-align:center}
.cmp-teams{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;padding-top:16px;border-top:1px solid var(--g5)}
.cmp-team-col{}
.cmp-team-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--g3);border-radius:6px;margin-bottom:6px;border:1px solid var(--g5)}
.cmp-tm-name{font-family:var(--fd);font-size:15px;font-weight:600;text-transform:uppercase;flex:1}
.cmp-tm-stat{font-family:var(--fd);font-size:15px;font-weight:700}

/* ═══ MATCHUPS ═══ */
.mu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:768px){.mu-grid{grid-template-columns:1fr}}
.mu-card{background:var(--g2);border:1px solid var(--g5);border-radius:8px;overflow:hidden}
.mu-top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:2px solid var(--r);background:linear-gradient(135deg,var(--g3),var(--g2))}
.mu-p{text-align:center;flex:1}
.mu-rk{font-family:var(--fd);font-size:13px;font-weight:500;letter-spacing:2px;color:var(--t4);text-transform:uppercase}
.mu-nm{font-family:var(--fd);font-size:28px;font-weight:800;text-transform:uppercase}
.mu-pj{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--y);margin-top:2px}
.mu-v{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--r);letter-spacing:2px;padding:0 16px}
.mu-bars{padding:16px 20px}
.mu-br{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mu-br:last-child{margin-bottom:0}
.mu-bl{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);width:50px;text-align:right;flex-shrink:0}
.mu-bt{flex:1;height:22px;background:var(--g4);border-radius:3px;display:flex;overflow:hidden}
.mu-bL{height:100%;background:var(--r);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:var(--fd);font-size:12px;font-weight:700;min-width:30px;transition:width 1s}
.mu-bR{height:100%;background:var(--g6);display:flex;align-items:center;padding-left:8px;font-family:var(--fd);font-size:12px;font-weight:700;min-width:30px;transition:width 1s}

/* ═══ PLAYER CARDS ═══ */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:14px}
@media(max-width:400px){.cg{grid-template-columns:1fr}}
.pc{background:var(--g2);border:1px solid var(--g5);border-radius:8px;overflow:hidden;transition:all .2s}
.pc:hover{border-color:var(--g6)}
.pch{padding:18px 18px 14px;position:relative;border-bottom:2px solid var(--r);overflow:hidden}
.pch-rk{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.pch-rk.r1{color:var(--y)}.pch-rk.rn{color:var(--t4)}
.pch-t{display:flex;justify-content:space-between;align-items:flex-end}
.pch-nm{font-family:var(--fd);font-size:32px;font-weight:800;text-transform:uppercase}
.pch-pv{font-family:var(--fd);font-size:40px;font-weight:800;color:var(--y);line-height:1;letter-spacing:-1px}
.pch-pl{font-family:var(--fd);font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}
.pch-gb{font-family:var(--fd);font-size:12px;color:var(--t3);margin-top:1px}
.pc-sr{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--g5)}
.pc-sc{padding:12px;text-align:center;border-right:1px solid var(--g5)}
.pc-sc:last-child{border-right:none}
.pc-sv{font-family:var(--fd);font-size:22px;font-weight:700}
.pc-sl{font-family:var(--fd);font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-top:2px}
.pc-tr{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(51,51,51,.4)}
.pc-tr:last-child{border-bottom:none}
.pc-trn{font-family:var(--fd);font-size:15px;font-weight:700;text-transform:uppercase}
.pc-trm{font-size:12px;color:var(--t4);margin-top:1px}
.pc-trr{font-family:var(--fd);font-size:17px;font-weight:700}

/* ═══ TEAMS TABLE ═══ */
.tw{background:var(--g2);border:1px solid var(--g5);border-radius:8px;overflow:hidden}
.ttbl{width:100%;border-collapse:collapse}
.ttbl th{font-family:var(--fd);padding:12px 16px;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);background:var(--g3);border-bottom:2px solid var(--r);text-align:left}
.ttbl th.r{text-align:right}
.ttbl td{padding:10px 16px;font-size:13px;font-weight:500;border-bottom:1px solid rgba(51,51,51,.4)}
.ttbl tr:last-child td{border-bottom:none}
.ttbl tr:hover td{background:rgba(255,255,255,.015)}
.ttbl td.r{text-align:right}
.ttc{display:flex;align-items:center;gap:10px}
.ttn{font-family:var(--fd);font-weight:600;text-transform:uppercase;font-size:14px}
.tto{color:var(--t4);font-size:12px}
.ttm{font-family:var(--fd);font-weight:700;font-size:14px}
.lg-col{white-space:nowrap}

/* ═══ DRAFT BOARD ═══ */
.db{background:var(--g2);border:1px solid var(--g5);border-radius:8px;overflow:hidden}
.dbg{display:grid;grid-template-columns:64px repeat(8,1fr)}
@media(max-width:768px){.dbg{grid-template-columns:48px repeat(8,1fr)}}
.dbh{font-family:var(--fd);padding:12px 4px;text-align:center;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);background:var(--g3);border-bottom:2px solid var(--r);border-right:1px solid rgba(51,51,51,.4)}
.dbh:last-child{border-right:none}
.dbr{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:var(--fd);font-size:12px;font-weight:700;color:var(--r);background:var(--g3);border-right:1px solid var(--g5);border-bottom:1px solid rgba(51,51,51,.4)}
.db-flow{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-top:2px}
.dbp{padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;border-right:1px solid rgba(51,51,51,.3);border-bottom:1px solid rgba(51,51,51,.4);transition:background .15s}
.dbp:last-child{border-right:none}
.dbp:hover{background:rgba(255,255,255,.02)}
.db-pick{font-family:var(--fm);font-size:10px;font-weight:600;color:var(--t4);letter-spacing:.5px}
.dba{font-family:var(--fd);font-size:13px;font-weight:700}
.dbou{font-size:11px;color:var(--t4)}
.dbt-row{background:var(--g3);border-top:2px solid var(--r)}
.dbt-row .dbr{color:var(--y);border-bottom:none}
.dbt-row .dbp{border-bottom:none;background:var(--g3)}
.dbtv{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--y)}
.dbts{font-size:11px;color:var(--t4)}

/* ═══ BOTTOMLINE — SINGLE PREMIUM TICKER ═══ */
.bl{position:fixed;bottom:0;left:0;right:0;z-index:2000;box-shadow:0 -4px 24px rgba(0,0,0,.6)}
.bl-t{height:36px;display:flex;align-items:center;background:linear-gradient(180deg,#1a1a1a,#111);border-top:2px solid var(--r);overflow:hidden;position:relative}
.bl-tag{flex-shrink:0;background:var(--r);color:white;padding:0 18px;height:100%;display:flex;align-items:center;font-family:var(--fd);font-size:12px;font-weight:800;letter-spacing:3px;text-transform:uppercase;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 100%,0 100%);padding-right:24px}
.bl-sw{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;mask-image:linear-gradient(90deg,transparent,#000 40px,#000 calc(100% - 40px),transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 40px,#000 calc(100% - 40px),transparent)}
.bl-s{display:flex;align-items:center;white-space:nowrap;animation:tk1 var(--td1,60s) linear infinite}
.bl-s:hover{animation-play-state:paused}
@keyframes tk1{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tki{display:flex;align-items:center;gap:8px;padding:0 20px;flex-shrink:0}
.tkt{font-family:var(--fd);font-size:13px;font-weight:600;color:var(--t2);letter-spacing:.5px}
.tkt b{color:white;font-weight:700}.tkt .hl{color:var(--y);font-weight:800}
.tkt .sub{color:var(--t4);font-weight:400;font-size:11px;margin-left:4px}
.tks{color:var(--r);font-size:5px;padding:0 4px;flex-shrink:0;opacity:.6}
.tk-stat{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--y);letter-spacing:.5px}
.tk-leader{display:flex;align-items:center;gap:6px;padding:0 24px;flex-shrink:0;border-left:1px solid rgba(204,0,0,.3);border-right:1px solid rgba(204,0,0,.3);margin:0 4px}
.tk-leader .tkt{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--t4)}
.tk-leader .tk-stat{font-size:15px}

/* ═══ UNDRAFTED TEAMS ═══ */
.undrafted-row td{opacity:.65}
.undrafted-row:hover td{opacity:1}
.undrafted-tag{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#111;padding:3px 8px;border:1px solid rgba(255,204,0,.5);border-radius:4px;background:var(--y)}
.owner-tag{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#fff;padding:3px 8px;border:1px solid rgba(204,0,0,.5);border-radius:4px;background:var(--r)}

/* ═══ HISTORY TAB ═══ */
.hist-section{margin-bottom:36px}
.hist-section-title{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--t1);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--g4)}
.hist-card{background:var(--g2);border:1px solid var(--g4);border-radius:10px;margin-bottom:24px;overflow:hidden}
.hist-card-hdr{display:flex;align-items:center;gap:14px;padding:16px 20px;background:linear-gradient(135deg,var(--g3),var(--g2));border-bottom:1px solid var(--g4)}
.hist-card-title{font-family:var(--fd);font-size:22px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t1)}
.hist-sport-badge{font-family:var(--fd);font-size:12px;font-weight:800;letter-spacing:2px;padding:5px 12px;border-radius:4px;text-transform:uppercase}
.hist-sport-badge.nfl{background:rgba(0,53,148,.3);color:#4a90d9;border:1px solid rgba(0,53,148,.5)}
.hist-sport-badge.mlb{background:rgba(204,0,0,.15);color:var(--r);border:1px solid rgba(204,0,0,.3)}
.hist-note{font-family:var(--fb);font-size:14px;color:var(--t3);padding:12px 20px;font-style:italic;border-bottom:1px solid var(--g4)}
.hist-card .tw{padding:0}
.hist-card .ttbl{border-radius:0}
.hist-top td{background:rgba(255,204,0,.03)}
.hist-name{font-family:var(--fd);font-size:16px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.hist-trophy{font-size:14px;margin-left:4px}
/* Title chips: mini league logo + year */
.title-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px 2px 4px;border-radius:4px;font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.5px;vertical-align:middle;margin-left:6px;line-height:1}

// ═══ HELPERS ═══
const pace=(w,l)=>(w+l)===0?null:Math.round((w/(w+l))*162);
const blendedPace=(w,l,ou)=>{const gp=w+l;if(gp===0)return null;const raw=(w/gp)*162;return Math.round((raw*gp+ou*162)/(gp+162))};
const pOU=(t)=>{const bp=blendedPace(t.w,t.l,t.ou);return bp!==null?bp:t.ou};
function pStats(p){
  let w=0,ls=0,ou=0,proj=0,gp=0,live=false,wae=0;
  p.teams.forEach(t=>{
    w+=t.w;ls+=t.l;ou+=t.ou;
    const tg=t.w+t.l;
    const pc=blendedPace(t.w,t.l,t.ou);
    if(pc!==null){proj+=pc;live=true;gp=Math.max(gp,tg)}else{proj+=t.ou}
    // Wins Above Expectation: actual wins vs expected wins through games played
    if(tg>0){wae+=t.w-(t.ou*tg/162)}
  });
  return{wins:w,losses:ls,ou,proj,gp,live,delta:proj-ou,wae}
}
const shortN=(n)=>n.replace(/^(Los Angeles|New York|San Diego|San Francisco|Kansas City|Tampa Bay|St\. Louis|Toronto|Chicago|Boston|Detroit|Oakland|Atlanta|Arizona|Seattle|Cleveland|Cincinnati|Baltimore|Pittsburgh|Houston|Colorado|Milwaukee|Minnesota|Washington|Philadelphia|Miami|Texas|Buffalo|Carolina|Denver|Green Bay|Indianapolis|Jacksonville|Las Vegas|New England|New Orleans|Tennessee|Dallas) /,"");
const ordinal=(n)=>{const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])};
const getRanked=()=>{
  const mapped=POOL.players.map(p=>({...p,s:pStats(p)}));
  const anyGames=mapped.some(p=>p.s.gp>0);
  // Sort by actual wins only. Pre-season: sort by projected as preview.
  if(anyGames) return mapped.sort((a,b)=>b.s.wins-a.s.wins||b.s.proj-a.s.proj);
  return mapped.sort((a,b)=>b.s.proj-a.s.proj);
};
const tc=(a,i=0)=>(TC[a]||["#333","#666"])[i];
// Pick the lighter/higher-contrast color from a team's palette for borders on dark bg
const lum=(hex)=>{let h=hex.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];const r=parseInt(h.substr(0,2),16)/255,g=parseInt(h.substr(2,2),16)/255,b=parseInt(h.substr(4,2),16)/255;const s=c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);return 0.2126*s(r)+0.7152*s(g)+0.0722*s(b)};
// Override map: teams where identity color > pure contrast
const BORDER_OV={LAD:'#005A9C',NYY:'#003087',DET:'#0C2340',ARI:'#00A6A0',SEA:'#005C5C',KC:'#004687',TOR:'#134A8E'};
const bestC=(colors,abbr)=>{if(BORDER_OV[abbr])return BORDER_OV[abbr];if(!colors||colors.length<2)return(colors||["#666"])[0];return lum(colors[0])>=lum(colors[1])?colors[0]:colors[1]};

// Logo builder: white bg for ALL logos, team color on BORDER only
const LB=(a,sz='md')=>`<div class="lbox ${sz}" style="--acc:${bestC(TC[a]||["#333","#666"],a)}"><img src="${L(a)}" alt="${a}"></div>`;

// ═══ COUNTDOWN ═══
function updateCountdown(){
  const el=document.getElementById('countdown');
  if(!el)return;
  const now=new Date();
  const gp=getRanked()[0].s.gp;
  if(gp>0){
    el.innerHTML=`<div class="cd-message">Season in Progress &bull; Game ${gp} of 162</div>`;
    return;
  }
  const diff=POOL.openingDay-now;
  if(diff<=0){el.innerHTML=`<div class="cd-message">Play Ball!</div>`;return}
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  el.innerHTML=`<div class="countdown"><div class="cd-unit"><div class="cd-num">${d}</div><div class="cd-lbl">Days</div></div><div class="cd-unit"><div class="cd-num">${String(h).padStart(2,'0')}</div><div class="cd-lbl">Hours</div></div><div class="cd-unit"><div class="cd-num">${String(m).padStart(2,'0')}</div><div class="cd-lbl">Min</div></div><div class="cd-unit"><div class="cd-num">${String(s).padStart(2,'0')}</div><div class="cd-lbl">Sec</div></div></div><div class="cd-message">Until Opening Day</div>`;
}

// ═══ BREAKING NEWS ═══
function getBreaking(){
  const R=getRanked();
  const gp=R[0].s.gp;
  if(gp===0){
    // Pre-season
    const high=R[0],low=R[R.length-1];
    const spread=(high.s.proj-low.s.proj).toFixed(0);
    return `Pre-season projections set <b>${high.name}</b> as the favorite at <b>${high.s.proj}</b> projected wins. The spread from 1st to 8th is <b>${spread}</b> wins. Opening Day is almost here.`;
  }
  // During season - generate dynamic headline
  const leader=R[0],second=R[1];
  const wGap=leader.s.wins-second.s.wins;
  if(wGap===0) return `It's dead even! <b>${leader.name}</b> and <b>${second.name}</b> are tied at <b>${leader.s.wins}</b> win${leader.s.wins!==1?'s':''} through Game ${gp}.`;
  if(wGap<=2) return `It's a tight race! <b>${leader.name}</b> leads <b>${second.name}</b> by just <b>${wGap}</b> win${wGap!==1?'s':''} through Game ${gp}.`;
  return `<b>${leader.name}</b> holds a <b>${wGap}</b>-win lead over <b>${second.name}</b> through Game ${gp} of 162.`;
}

// ═══ NARRATIVE HIGHLIGHTS ═══
function getHighlights(){
  const R=getRanked();
  const allT=POOL.players.flatMap(p=>p.teams.map(t=>({...t,owner:p.name})));
  const sT=allT.map(t=>{const tg=t.w+t.l;const tWae=tg>0?t.w-(t.ou*tg/162):null;return{...t,pv:pOU(t),dv:pOU(t)-t.ou,wae:tWae}}).sort((a,b)=>b.pv-a.pv);
  const items=[];
  const gp=R[0].s.gp;
  const seasonStarted=gp>0;

  if(seasonStarted){
    // LIVE SEASON HEADLINES

    // Closest race - compare ACTUAL wins across ALL player pairs
    let minGap=999;let closeA,closeB;
    for(let i=0;i<R.length;i++){for(let j=i+1;j<R.length;j++){const g=Math.abs(R[i].s.wins-R[j].s.wins);if(g<minGap){minGap=g;closeA=R[i];closeB=R[j]}}}
    if(closeA&&closeB){
      if(minGap===0) items.push({icon:"\u{1F525}",text:"Closest matchup: <b>"+closeA.name+"</b> and <b>"+closeB.name+"</b> are tied at <b>"+closeA.s.wins+"</b> win"+(closeA.s.wins===1?"":"s")+" through Game "+gp+"."});
      else items.push({icon:"\u{1F525}",text:"Closest matchup: <b>"+closeA.name+"</b> vs <b>"+closeB.name+"</b> separated by just <b>"+minGap+"</b> win"+(minGap===1?"":"s")+" through Game "+gp+"."});
    }

    // Best performing team by pace
    const best=sT[0];
    const bestWaeStr=(best.w+best.l)>0&&best.wae!==null?" \u2014 <b>"+(best.wae>=0?"+":"")+best.wae.toFixed(1)+"</b> vs expected":"";
    items.push({icon:"\u{1F3C6}",text:"Top performing team: <b>"+shortN(best.name)+"</b> ("+best.owner+") pacing at <b>"+best.pv+"</b> wins"+bestWaeStr+"."});

    // Anchor watch
    const worst=sT[sT.length-1];
    const worstWaeStr=(worst.w+worst.l)>0&&worst.wae!==null?" \u2014 <b class=\"red\">"+(worst.wae>=0?"+":"")+worst.wae.toFixed(1)+"</b> vs expected":"";
    items.push({icon:"\u{1F4C9}",text:"Anchor watch: <b>"+shortN(worst.name)+"</b> ("+worst.owner+") pacing at <b>"+worst.pv+"</b> wins"+worstWaeStr+"."});

    // Biggest WAE overperformer
    const overT=sT.filter(t=>t.wae!==null&&t.wae>0).sort((a,b)=>b.wae-a.wae)[0];
    if(overT) items.push({icon:"\u{1F4C8}",text:"Biggest value: <b>"+shortN(overT.name)+"</b> is <b>+"+overT.wae.toFixed(1)+"</b> wins above expected through "+(overT.w+overT.l)+" games \u2014 huge for <b>"+overT.owner+"</b>."});

    // Biggest WAE underperformer
    const underT=sT.filter(t=>t.wae!==null&&t.wae<0).sort((a,b)=>a.wae-b.wae)[0];
    if(underT) items.push({icon:"\u26A0\uFE0F",text:"Biggest drag: <b>"+shortN(underT.name)+"</b> is <b class=\"red\">"+underT.wae.toFixed(1)+"</b> wins below expected through "+(underT.w+underT.l)+" games \u2014 costing <b>"+underT.owner+"</b>."});

  } else {
    // PRE-SEASON HEADLINES
    const high=R[0],low=R[R.length-1];
    const spread=(high.s.ou-low.s.ou).toFixed(1);

    items.push({icon:"\u{1F3B0}",text:"Vegas favorite: <b>"+high.name+"</b> holds the highest combined O/U at <b>"+high.s.ou.toFixed(1)+"</b> wins \u2014 a <b>"+spread+"</b>-win edge over <b>"+low.name+"</b> ("+low.s.ou.toFixed(1)+")."});

    const bestT=sT[0];
    items.push({icon:"\u{1F3C6}",text:"Highest O/U team: <b>"+shortN(bestT.name)+"</b> ("+bestT.owner+") at <b>"+bestT.ou+"</b> projected wins \u2014 the crown jewel of this draft."});

    const worstT=sT[sT.length-1];
    items.push({icon:"\u{1F4C9}",text:"Lowest O/U team: <b>"+shortN(worstT.name)+"</b> ("+worstT.owner+") at <b>"+worstT.ou+"</b> projected wins \u2014 the anchor weight."});

    let minOUGap=999;let gapA,gapB;
    for(let i=0;i<R.length;i++){for(let j=i+1;j<R.length;j++){const g=Math.abs(R[i].s.ou-R[j].s.ou);if(g<minOUGap){minOUGap=g;gapA=R[i];gapB=R[j]}}}
    if(gapA&&gapB) items.push({icon:"\u{1F525}",text:"Tightest O/U gap: <b>"+gapA.name+"</b> ("+gapA.s.ou.toFixed(1)+") vs <b>"+gapB.name+"</b> ("+gapB.s.ou.toFixed(1)+") \u2014 separated by just <b>"+minOUGap.toFixed(1)+"</b> projected wins. This one could go either way."});

    items.push({icon:"\u{1F4CB}",text:"All projections based on pre-season Vegas O/U lines. Headlines update automatically once games begin."});
  }

  return items;
}

// ═══ RACE CHART — AUTO-POPULATE FROM LIVE DATA ═══
// Automatically builds a race snapshot from current standings every render.
// Combines manual POOL.history entries with live auto-generated point.
let raceHidden={};
function getRaceData(){
  const manual=[...POOL.history];
  const R=getRanked();
  const gp=R[0].s.gp;
  if(gp>0){
    // Build a live snapshot from current standings
    const livePoint={game:gp,date:'Now',data:{}};
    R.forEach(p=>{livePoint.data[p.name]=p.s.wins});
    // Avoid duplicating if manual history already has this game number
    const lastManual=manual.length>0?manual[manual.length-1].game:0;
    if(gp>lastManual){manual.push(livePoint)}
  }
  return manual;
}
function drawRace(){
  const canvas=document.getElementById('raceCanvas');
  if(!canvas)return;
  const hist=getRaceData();
  if(hist.length<1){return}// Need at least 1 data point (auto-generates origin + live)
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height,pad={top:20,right:70,bottom:40,left:50};
  const cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  const names=POOL.players.map(p=>p.name);
  const data=[{game:0,date:'',data:Object.fromEntries(names.map(n=>[n,0]))},...hist];
  const pts=data.length;
  let maxY=0,maxG=162;
  data.forEach(d=>{names.forEach(n=>{if(d.data[n]>maxY)maxY=d.data[n]});if(d.game>maxG)maxG=d.game});
  if(maxY<=5)maxY=maxY+2;else if(maxY<=20)maxY=Math.ceil(maxY/5)*5+5;else if(maxY<=60)maxY=Math.ceil(maxY/10)*10+10;else maxY=Math.ceil(maxY/20)*20+20;
  // Grid — use integer steps to avoid duplicate labels
  const gridStep=maxY<=10?1:maxY<=30?5:maxY<=80?10:20;
  const gridLines=Math.ceil(maxY/gridStep);
  ctx.strokeStyle='#222';ctx.lineWidth=1;
  for(let i=0;i<=gridLines;i++){const val=i*gridStep;const y=pad.top+ch-(val/maxY)*ch;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();ctx.fillStyle='#555';ctx.font='10px Oswald';ctx.textAlign='right';ctx.fillText(val,pad.left-8,y+3)}
  // X labels (game numbers)
  ctx.textAlign='center';
  const gLabels=[0,20,40,60,80,100,120,140,162];
  gLabels.forEach(g=>{const x=pad.left+(g/maxG)*cw;ctx.fillStyle='#444';ctx.font='10px Oswald';ctx.fillText(g===0?'Start':'G'+g,x,H-pad.bottom+20);ctx.strokeStyle='#1a1a1a';ctx.beginPath();ctx.moveTo(x,pad.top);ctx.lineTo(x,pad.top+ch);ctx.stroke()});
  // Lines
  names.forEach((name,ni)=>{
    if(raceHidden[name])return;
    ctx.strokeStyle=PCOL[ni];ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.beginPath();
    for(let i=0;i<pts;i++){const x=pad.left+(data[i].game/maxG)*cw;const y=pad.top+ch-(data[i].data[name]/maxY)*ch;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
    ctx.stroke();
    const lastX=pad.left+(data[pts-1].game/maxG)*cw;const lastY=pad.top+ch-(data[pts-1].data[name]/maxY)*ch;
    ctx.fillStyle=PCOL[ni];ctx.font='bold 11px Oswald';ctx.textAlign='left';ctx.fillText(name,lastX+8,lastY+4);
  });
  // Hover
  canvas.onmousemove=(e)=>{
    const br=canvas.getBoundingClientRect(),mx=e.clientX-br.left;
    if(mx<pad.left||mx>pad.left+cw){document.getElementById('rc-tt').style.display='none';return}
    const gameNum=((mx-pad.left)/cw)*maxG;
    let closest=0,closestDist=999;
    data.forEach((d,i)=>{const dist=Math.abs(d.game-gameNum);if(dist<closestDist){closestDist=dist;closest=i}});
    const snap=data[closest];
    const sorted=names.filter(n=>!raceHidden[n]).map(n=>({n,v:snap.data[n]})).sort((a,b)=>b.v-a.v);
    let html=`<div class="rc-tt-w">${snap.game===0?'Start':'Game '+snap.game}</div>`;
    sorted.forEach(s=>{html+=`<div class="rc-tt-r"><div class="rc-tt-d" style="background:${PCOL[names.indexOf(s.n)]}"></div><span class="rc-tt-n">${s.n}</span><span class="rc-tt-v">${s.v}</span></div>`});
    const tt=document.getElementById('rc-tt');tt.innerHTML=html;tt.style.display='block';
    let tx=e.clientX-br.left+16,ty=e.clientY-br.top-10;
    if(tx+200>W)tx=e.clientX-br.left-210;tt.style.left=tx+'px';tt.style.top=ty+'px';
    drawRace();
    const sx=pad.left+(snap.game/maxG)*cw;
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(sx,pad.top);ctx.lineTo(sx,pad.top+ch);ctx.stroke();ctx.setLineDash([]);
    names.forEach((name,ni)=>{if(raceHidden[name])return;const y=pad.top+ch-(snap.data[name]/maxY)*ch;ctx.fillStyle=PCOL[ni];ctx.beginPath();ctx.arc(sx,y,4,0,Math.PI*2);ctx.fill()});
  };
  canvas.onmouseleave=()=>{document.getElementById('rc-tt').style.display='none'};
  // Touch support for mobile
  const handleTouch=(e)=>{e.preventDefault();const t=e.touches[0];if(!t)return;const br=canvas.getBoundingClientRect(),mx=t.clientX-br.left;if(mx<pad.left||mx>pad.left+cw){document.getElementById('rc-tt').style.display='none';return}const gameNum=((mx-pad.left)/cw)*maxG;let closest=0,closestDist=999;data.forEach((d,i)=>{const dist=Math.abs(d.game-gameNum);if(dist<closestDist){closestDist=dist;closest=i}});const snap=data[closest];const sorted=names.filter(n=>!raceHidden[n]).map(n=>({n,v:snap.data[n]})).sort((a,b)=>b.v-a.v);let html=`<div class="rc-tt-w">${snap.game===0?'Start':'Game '+snap.game}</div>`;sorted.forEach(s=>{html+=`<div class="rc-tt-r"><div class="rc-tt-d" style="background:${PCOL[names.indexOf(s.n)]}"></div><span class="rc-tt-n">${s.n}</span><span class="rc-tt-v">${s.v}</span></div>`});const tt=document.getElementById('rc-tt');tt.innerHTML=html;tt.style.display='block';let tx=t.clientX-br.left+16,ty=t.clientY-br.top-60;if(tx+200>W)tx=t.clientX-br.left-210;if(ty<0)ty=10;tt.style.left=tx+'px';tt.style.top=ty+'px'};
  canvas.ontouchstart=handleTouch;canvas.ontouchmove=handleTouch;
  canvas.ontouchend=()=>{document.getElementById('rc-tt').style.display='none'};
}
function toggleRace(name,el){raceHidden[name]=!raceHidden[name];el.classList.toggle('dim');el.setAttribute('aria-checked',!raceHidden[name]);drawRace()}

// ═══ COMPARISON ═══
function renderCompare(aIdx,bIdx){
  const a=POOL.players[aIdx],b=POOL.players[bIdx];
  const sa=pStats(a),sb=pStats(b);
  const stats=[
    {label:'Actual Wins',a:sa.wins,b:sb.wins},
    {label:'Proj Wins',a:sa.proj,b:sb.proj},
    {label:'O/U Total',a:sa.ou,b:sb.ou},
    {label:'vs Expected',a:sa.gp>0?sa.wae:0,b:sb.gp>0?sb.wae:0},
  ];
  let rows='';
  stats.forEach(s=>{
    const aWin=s.a>s.b,bWin=s.b>s.a;
    rows+=`<div class="cmp-row"><div class="cmp-row-val left${aWin?' win':''}">${typeof s.a==='number'&&s.a%1!==0?s.a.toFixed(1):s.a}</div><div class="cmp-row-label">${s.label}</div><div class="cmp-row-val right${bWin?' win':''}">${typeof s.b==='number'&&s.b%1!==0?s.b.toFixed(1):s.b}</div></div>`;
  });
  let aTeams='',bTeams='';
  a.teams.forEach(t=>{const tp=pOU(t);aTeams+=`<div class="cmp-team-item">${LB(t.abbr,'xs')}<div class="cmp-tm-name">${shortN(t.name)}</div><div class="cmp-tm-stat">${tp}</div></div>`});
  b.teams.forEach(t=>{const tp=pOU(t);bTeams+=`<div class="cmp-team-item">${LB(t.abbr,'xs')}<div class="cmp-tm-name">${shortN(t.name)}</div><div class="cmp-tm-stat">${tp}</div></div>`});
  document.getElementById('cmp-body').innerHTML=`${rows}<div class="cmp-teams"><div class="cmp-team-col">${aTeams}</div><div class="cmp-team-col">${bTeams}</div></div>`;
  document.getElementById('cmp-name-a').textContent=a.name;
  document.getElementById('cmp-name-b').textContent=b.name;
}

function render(){
const R=getRanked();const gp=R[0].s.gp;const pct=gp>0?((gp/POOL.games)*100).toFixed(1):0;

const MLB_ID_ABBR={108:"LAA",109:"ARI",110:"BAL",111:"BOS",112:"CHC",113:"CIN",114:"CLE",115:"COL",116:"DET",117:"HOU",118:"KC",119:"LAD",120:"WSH",121:"NYM",133:"OAK",134:"PIT",135:"SD",136:"SEA",137:"SF",138:"STL",139:"TB",140:"TEX",141:"TOR",142:"MIN",143:"PHI",144:"ATL",145:"CHW",146:"MIA",147:"NYY",158:"MIL"};

// ═══ GAME DATA: RESULTS, LIVE, UPCOMING ═══
const GAME_LOG={};  // abbr -> [{type,date,opp,home,w,rs,ra,inning,time}]
let SCOREBOARD=[];  // [{state,away,home,awayS,homeS,inning,innHalf,time,day,awayP,homeP,poolAway,poolHome,gameDateRaw}]

function fetchGameResults(){
  const now=new Date();const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const today=fmt(now);const start=fmt(new Date(now.getTime()-3*86400000));
  const tomorrow=fmt(new Date(now.getTime()+86400000));
  const url=`https://statsapi.mlb.com/api/v1/schedule?sportId=1&startDate=${start}&endDate=${tomorrow}&hydrate=linescore,probablePitcher`;
  return fetch(url).then(r=>r.json()).then(data=>{
    const results={};const sbGames=[];
    const addEntry=(abbr,entry)=>{if(!results[abbr])results[abbr]=[];results[abbr].push(entry)};
    // Build set of pool teams for ownership tagging
    const poolTeams={};POOL.players.forEach(p=>p.teams.forEach(t=>{poolTeams[t.abbr]=p.name}));
    (data.dates||[]).forEach(d=>{
      const dateStr=new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const isToday=d.date===today;const isTomorrow=d.date===tomorrow;
      (d.games||[]).forEach(g=>{
        if(g.gameType!=='R')return;
        const away=g.teams.away,home=g.teams.home;
        const awayAbbr=MLB_ID_ABBR[away.team.id],homeAbbr=MLB_ID_ABBR[home.team.id];
        const awayS=away.score||0,homeS=home.score||0;
        const state=g.status.abstractGameState;// Preview, Live, Final
        const ls=g.linescore||{};
        const inn=ls.currentInning||'';const half=ls.inningHalf||'';
        const innStr=inn?(half==='Top'?'\u25B2'+inn:half==='Bottom'?'\u25BC'+inn:inn+'th'):'';
        // Probable pitchers
        const awayPP=away.probablePitcher;const homePP=home.probablePitcher;
        const fmtP=(pp)=>{if(!pp)return'TBD';if(pp.firstName&&pp.lastName)return pp.firstName.charAt(0)+'. '+pp.lastName;if(pp.fullName){const pts=pp.fullName.split(' ');return pts.length>1?pts[0].charAt(0)+'. '+pts.slice(1).join(' '):pp.fullName}return pp.lastName||'TBD'};
        const awayPName=fmtP(awayPP);
        const homePName=fmtP(homePP);

        if(state==='Final'){
          if(awayAbbr)addEntry(awayAbbr,{type:'final',date:dateStr,opp:homeAbbr,home:false,w:awayS>homeS,rs:awayS,ra:homeS});
          if(homeAbbr)addEntry(homeAbbr,{type:'final',date:dateStr,opp:awayAbbr,home:true,w:homeS>awayS,rs:homeS,ra:awayS});
        } else if(state==='Live'){
          if(awayAbbr)addEntry(awayAbbr,{type:'live',opp:homeAbbr,home:false,rs:awayS,ra:homeS,inning:innStr});
          if(homeAbbr)addEntry(homeAbbr,{type:'live',opp:awayAbbr,home:true,rs:homeS,ra:awayS,inning:innStr});
        } else if(state==='Preview'){
          const gt=new Date(g.gameDate);
          const ctStr=gt.toLocaleString('en-US',{timeZone:'America/Chicago',hour:'numeric',minute:'2-digit',hour12:true});
          const timeStr=ctStr.replace(' ','').replace('AM','a').replace('PM','p')+' CT';
          const dayLabel=isToday?'':isTomorrow?'Tmr':'';
          if(awayAbbr)addEntry(awayAbbr,{type:'upcoming',opp:homeAbbr,home:false,time:timeStr,day:dayLabel});
          if(homeAbbr)addEntry(homeAbbr,{type:'upcoming',opp:awayAbbr,home:true,time:timeStr,day:dayLabel});
        }
        // Scoreboard entry (today's + tomorrow's games only)
        if((isToday||isTomorrow)&&awayAbbr&&homeAbbr){
          const gt=new Date(g.gameDate);
          const ctStr2=gt.toLocaleString('en-US',{timeZone:'America/Chicago',hour:'numeric',minute:'2-digit',hour12:true});
          const timeStr=ctStr2.replace(' ','').replace('AM','a').replace('PM','p')+' CT';
          sbGames.push({
            state,away:awayAbbr,home:homeAbbr,awayS,homeS,
            inning:innStr,innNum:inn,innHalf:half,
            time:timeStr,day:isToday?'Today':isTomorrow?'Tomorrow':'',
            awayP:awayPName,homeP:homePName,
            poolAway:poolTeams[awayAbbr]||null,poolHome:poolTeams[homeAbbr]||null,
            gameDateRaw:g.gameDate
          });
        }
      });
    });
    Object.keys(GAME_LOG).forEach(k=>delete GAME_LOG[k]);
    Object.assign(GAME_LOG,results);
    // Sort scoreboard: live first, then upcoming by time, then final
    const stateOrd={Live:1,Preview:2,Final:3};
    SCOREBOARD=sbGames.sort((a,b)=>(stateOrd[a.state]||9)-(stateOrd[b.state]||9)||new Date(a.gameDateRaw)-new Date(b.gameDateRaw));
    renderScoreboard();
  }).catch(()=>{});
}

// PRIMARY: MLB Stats API
function fetchMLBApi(){
  return fetch(MLB_API).then(r=>r.json()).then(data=>{
    const standings={};
    (data.records||[]).forEach(div=>{
      (div.teamRecords||[]).forEach(tr=>{
        const abbr=MLB_ID_ABBR[tr.team.id];
        if(abbr)standings[abbr]={w:tr.wins||0,l:tr.losses||0};
      });
    });
    return standings;
  });
}

// FALLBACK: Google Sheets CSV
function parseCSV(text){
  const rows=[];const lines=text.split('\n');
  lines.forEach(line=>{
    if(!line.trim())return;
    const cols=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ}
      else if(c===','&&!inQ){cols.push(cur.trim());cur=''}
      else{cur+=c}
    }
    cols.push(cur.trim());
    rows.push(cols);
  });
  return rows;
}

function fetchGSheets(){
  return fetch(GVIZ).then(r=>r.text()).then(csv=>{
    const rows=parseCSV(csv);
    const standings={};
    rows.forEach(r=>{
      if(!r[0]||r[0]==='Team_Clean'||r[0]==='Tm')return;
      const name=r[0],w=parseInt(r[2]),l=parseInt(r[3]);
      if(isNaN(w)||isNaN(l))return;
      const abbr=NAME_TO_ABBR[name];
      if(abbr)standings[abbr]={w,l};
    });
    // Sanity check: reject stale data (if avg wins > games possible so far, data is from last year)
    const now=new Date();const daysSinceOpen=Math.max(0,(now-POOL.openingDay)/(1000*60*60*24));
    const maxReasonableWins=Math.ceil(daysSinceOpen*1.2)+5;// generous buffer
    const vals=Object.values(standings);
    const avgW=vals.reduce((s,v)=>s+v.w,0)/vals.length;
    if(avgW>maxReasonableWins){console.warn('GSheets data appears stale (2025?), skipping');return {}}
    return standings;
  });
}

let lastFetchOk=null; // null=pending, true=ok, false=error

function updateDataStatus(){

// ═══ COUNT-UP ANIMATION ═══
function animateValue(el,start,end,duration){
  if(start===end||!el)return;
  const range=end-start;const startTime=performance.now();
  function step(ts){
    const progress=Math.min((ts-startTime)/duration,1);
    const current=Math.round(start+range*progress);
    el.textContent=current;
    if(progress<1)requestAnimationFrame(step);
    else el.classList.add('num-change');
  }
  requestAnimationFrame(step);
}

// Fetch with API primary, GSheets fallback
function refreshData(isInitial){
  const seasonStarted = new Date() >= POOL.openingDay;
  if(!seasonStarted){
    if(isInitial){render();dismissLoading()}
    lastFetchOk=true;lastFetchTime=Date.now();updateDataStatus();
    return;
  }
  // Fetch standings + game results in parallel
  Promise.all([
    fetchMLBApi().catch(()=>null),
    fetchGameResults()
  ]).then(([standings])=>{
    if(standings&&applyStandings(standings)){
      lastFetchOk=true;lastFetchTime=Date.now();updateDataStatus();
      render();if(isInitial)dismissLoading();return;
    }
    // API returned no/little data — try GSheets fallback
    fetchGSheets().then(gs=>{
      const ok=applyStandings(gs);
      lastFetchOk=ok;lastFetchTime=ok?Date.now():lastFetchTime;updateDataStatus();
      render();if(isInitial)dismissLoading();
    }).catch(()=>{
      lastFetchOk=false;updateDataStatus();
      if(isInitial){render();dismissLoading()}
    });
  });
}

}

// Initial load + auto-refresh
refreshData(true);
setInterval(()=>refreshData(false),REFRESH_MS);
